name: Auto Release
on:
  push:
    branches: ["main"]
permissions:
  contents: write
jobs:
  release:
    name: Bump version → Tag → Push
    runs-on: ubuntu-latest
    # ✅ Skip if commit was made by the bot (prevents infinite loop)
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    outputs:
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read current version
        id: ver
        run: |
          VERSION=$(python - <<'EOF'
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          EOF
          )
          echo "current=$VERSION" >> $GITHUB_OUTPUT
      - name: Compute next version (PATCH bump)
        id: next
        run: |
          IFS='.' read MAJOR MINOR PATCH <<< "${{ steps.ver.outputs.current }}"
          PATCH=$((PATCH + 1))
          NEXT="$MAJOR.$MINOR.$PATCH"
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=v$NEXT" >> $GITHUB_OUTPUT
      - name: Update pyproject.toml
        run: |
          sed -i "s/version = \"${{ steps.ver.outputs.current }}\"/version = \"${{ steps.next.outputs.next }}\"/" pyproject.toml
      - name: Commit + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version ${{ steps.ver.outputs.current }} → ${{ steps.next.outputs.next }} [skip ci]"
          git tag "v${{ steps.next.outputs.next }}"
          git push origin main
          git push origin "v${{ steps.next.outputs.next }}"

  # ✅ Directly call publish.yml instead of relying on tag push to trigger it
  publish:
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
